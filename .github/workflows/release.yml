name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - run: go test ./...
      - run: go vet ./...

  binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: linux-amd64
          - goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Build archive
        env:
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          mkdir -p dist/stashfin
          CGO_ENABLED=0 GOOS=linux go build -trimpath \
            -ldflags="-s -w -X github.com/BaksiLi/stashfin/internal/buildinfo.Version=${VERSION} -X github.com/BaksiLi/stashfin/internal/buildinfo.Commit=${COMMIT}" \
            -o dist/stashfin/stashfin ./cmd/stashfin
          cp README.md LICENSE dist/stashfin/
          tar -C dist -czf "dist/stashfin-${VERSION}-${SUFFIX}.tar.gz" stashfin
      - uses: actions/upload-artifact@v7
        with:
          name: stashfin-${{ matrix.suffix }}
          path: dist/*.tar.gz

  github-release:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: stashfin-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.tar.gz --generate-notes --title "Stashfin $GITHUB_REF_NAME"

  container:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/baksili/stashfin:${{ github.ref_name }}
            ghcr.io/baksili/stashfin:latest
